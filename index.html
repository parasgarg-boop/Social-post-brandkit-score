      var box = document.getElementById('error-box');
      box.style.display = 'block';

      document.getElementById('loading-msg').style.display = 'none';

/* Resolve tokens in text — replaces {{token_key}} with location values or leaves unresolved */
function resolveTokens(text, location) {
  if (!text) return text;
  return text.replace(/\{\{(\w+)\}\}/g, (match, key) => {
    if (location && location.values[key] !== undefined) return location.values[key];
    const allTokens = BUSINESS_TOKENS.flatMap(c => c.tokens);
    const tok = allTokens.find(t => t.key === key);
    return tok ? `{{${tok.label}}}` : match;
  });
}

/* ════════════════════════════════════════════════════════════════
   SCORING ENGINE — generates detailed, content-aware scores
   Accepts selectedMedia to analyze media-caption relevance
   ════════════════════════════════════════════════════════════════ */
function generateScores(brand, postContent, channels, criteria, selectedMedia) {
  const content = postContent || "";
  const media = selectedMedia || [];
  const words = content.split(/\s+/).filter(Boolean);
  const hasEmoji = /[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{1F900}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/u.test(content);
  const hashtagList = content.match(/#\w+/g) || [];
  const sentenceCount = content.split(/[.!?]+/).filter(s => s.trim()).length;
  const avgWordLen = words.length ? words.reduce((a, w) => a + w.length, 0) / words.length : 0;
  const brandName = brand.name.toLowerCase();
  const brandKeywords = brand.name.toLowerCase().split(/\s+/);
  const contentLower = content.toLowerCase();
  const hasLink = content.includes("http") || content.includes("www") || content.includes(".com");
  const hasQuestion = /\?/.test(content);
  const lineBreaks = (content.match(/\n/g) || []).length;

  /* ── Media-caption relevance analysis ── */
  const hasMedia = media.length > 0;
  const uploadedMedia = media.filter(m => m.isUpload);
  const stockMedia = media.filter(m => !m.isUpload);
  const mediaLabels = media.map(m => (m.label || "").toLowerCase()).join(" ");

  // Extract topic keywords from caption (words > 3 chars, excluding common words)
  const stopWords = new Set(["the","and","for","are","but","not","you","all","can","had","her","was","one","our","out","has","have","from","with","they","been","this","that","will","each","make","like","just","over","such","take","than","them","very","some","into","most","other","more","about","your","also","come","keep","made","what","when","where","which","their","would","there","could","after","every","first","then","these","those","still","being","here","does","doing"]);
  const topicWords = words.filter(w => w.length > 3 && !stopWords.has(w.toLowerCase().replace(/[^a-z]/g, ""))).map(w => w.toLowerCase().replace(/[^a-z]/g, "")).filter(Boolean);

  // Check media-caption alignment by topic overlap
  const mediaTopicOverlap = hasMedia ? topicWords.filter(w => mediaLabels.includes(w)).length : 0;
  const mediaRelevanceRatio = topicWords.length > 0 ? mediaTopicOverlap / Math.min(topicWords.length, 5) : 0;

  /* ── 1. Brand Voice & Tone scoring ── */
  let voiceScore = 40;
  // Content substance
  if (content.length > 50) voiceScore += 8;
  if (content.length > 150) voiceScore += 5;
  if (sentenceCount >= 2) voiceScore += 6;
  if (sentenceCount >= 3 && sentenceCount <= 6) voiceScore += 4;
  // Conversational & engaging signals
  if (hasQuestion) voiceScore += 6;
  if (hasEmoji) voiceScore += 4;
  if (avgWordLen < 6.5) voiceScore += 5; // accessible language
  if (avgWordLen > 8) voiceScore -= 5; // overly complex
  // Brand name mention
  if (contentLower.includes(brandName)) voiceScore += 5;
  // Personality alignment — check if content reflects stated personality
  const personalityKeywordMap = {
    "Warm": ["love","heart","care","happy","joy","comfort","cozy","welcome"],
    "Expert": ["proven","research","data","insight","strategy","expertise","professional"],
    "Playful": ["fun","amazing","awesome","wow","excited","love","enjoy"],
    "Bold": ["powerful","strong","bold","fearless","unstoppable","dare","epic"],
    "Friendly": ["hey","hi","friend","together","community","join","welcome"],
    "Sophisticated": ["elegant","refined","luxury","premium","exclusive","curated"],
    "Approachable": ["easy","simple","just","try","come","welcome","everyone"],
    "Local-focused": ["neighborhood","local","community","near","town","here"],
    "Innovative": ["new","cutting-edge","revolutionary","breakthrough","transform","future"],
  };
  let personalityMatch = 0;
  brand.voice.personality.forEach(p => {
    const kws = personalityKeywordMap[p] || [];
    if (kws.some(k => contentLower.includes(k))) personalityMatch++;
  });
  voiceScore += Math.min(12, personalityMatch * 6);
  voiceScore = Math.min(95, voiceScore + Math.floor(Math.random() * 5));

  /* ── 2. Media & Caption Relevance scoring ── */
  let mediaScore = 30;
  if (hasMedia) {
    mediaScore += 20; // has media attached
    if (uploadedMedia.length > 0) mediaScore += 8; // custom media > stock
    if (mediaRelevanceRatio > 0.3) mediaScore += 12; // media labels match caption topics
    else if (mediaRelevanceRatio > 0) mediaScore += 6;
    if (media.length >= 2 && media.length <= 4) mediaScore += 5; // multi-image carousel
    if (media.length > 6) mediaScore -= 5; // too many images
    // Brand color alignment for stock images
    if (stockMedia.length > 0) mediaScore += 3;
    if (uploadedMedia.length > 0) mediaScore += 5; // real brand content
  } else {
    // No media — caption-first workflow, but media is important
    if (content.length > 100) mediaScore += 10; // at least has substantial caption
  }
  mediaScore = Math.min(95, mediaScore + Math.floor(Math.random() * 5));

  /* ── 3. Engagement & CTA scoring ── */
  let ctaScore = 30;
  const strongCTAs = ["shop now","book now","sign up","get started","learn more","discover","explore","try now","order now","subscribe"];
  const softCTAs = ["visit","check","see","read","come","join","follow","share","tag","click","tap","swipe"];
  const hasStrongCTA = strongCTAs.some(c => contentLower.includes(c));
  const hasSoftCTA = softCTAs.some(c => contentLower.includes(c));
  if (hasStrongCTA) ctaScore += 20;
  else if (hasSoftCTA) ctaScore += 12;
  if (hasLink) ctaScore += 10;
  if (hasQuestion) ctaScore += 8; // questions drive engagement
  if (contentLower.includes("comment") || contentLower.includes("tell us") || contentLower.includes("what do you")) ctaScore += 8;
  if (hasEmoji) ctaScore += 3;
  // Urgency/scarcity signals
  if (contentLower.includes("limited") || contentLower.includes("today") || contentLower.includes("now") || contentLower.includes("don't miss")) ctaScore += 5;
  ctaScore = Math.min(95, ctaScore + Math.floor(Math.random() * 8));

  /* ── 4. Hashtags & Keywords scoring ── */
  let hashScore = 35;
  const hasBrandTag = hashtagList.some(h => h.toLowerCase().includes(brandKeywords[0]));
  if (hashtagList.length > 0) hashScore += 12;
  if (hashtagList.length >= 3 && hashtagList.length <= 15) hashScore += 10;
  if (hasBrandTag) hashScore += 15;
  // Industry keyword presence
  if (brandKeywords.some(k => hashtagList.some(h => h.toLowerCase().includes(k)))) hashScore += 8;
  // Penalize extremes
  if (hashtagList.length > 20) hashScore -= 10;
  if (hashtagList.length === 0) hashScore -= 5;
  hashScore = Math.min(95, hashScore + Math.floor(Math.random() * 8));

  /* ── 5. Content Structure scoring ── */
  let structScore = 35;
  // Length appropriateness (general social media sweet spot: 40-200 words)
  if (words.length >= 20 && words.length <= 250) structScore += 12;
  if (words.length >= 40 && words.length <= 150) structScore += 5; // ideal range
  if (words.length < 10) structScore -= 5;
  if (words.length > 300) structScore -= 8;
  // Sentence variety
  if (sentenceCount >= 2 && sentenceCount <= 8) structScore += 8;
  if (sentenceCount === 1 && words.length > 30) structScore -= 5;
  // Readability
  if (avgWordLen >= 4 && avgWordLen <= 7) structScore += 5;
  // Emoji usage (moderate is good)
  if (hasEmoji) structScore += 5;
  // Line breaks / paragraph structure
  if (lineBreaks >= 1 && lineBreaks <= 5) structScore += 5;
  if (lineBreaks > 8) structScore -= 3;
  // Not all caps
  const capsRatio = content.replace(/[^A-Za-z]/g, "").length > 0 ? (content.replace(/[^A-Z]/g, "").length / content.replace(/[^A-Za-z]/g, "").length) : 0;
  if (capsRatio > 0.5) structScore -= 8;
  structScore = Math.min(95, structScore + Math.floor(Math.random() * 8));

  const scores = { voice: voiceScore, media: mediaScore, cta: ctaScore, hashtags: hashScore, structure: structScore };
  const enabledCriteria = criteria.filter(c => c.enabled);
  const totalWeight = enabledCriteria.reduce((a, c) => a + c.weight, 0);
  const overall = Math.round(enabledCriteria.reduce((a, c) => a + (scores[c.id] || 50) * (c.weight / totalWeight), 0));

  // Content-aware snippet extraction
  const firstSentence = content.split(/[.!?]/)[0]?.trim().substring(0, 60) || "your opening line";
  const lastSentence = content.split(/[.!?]/).filter(s => s.trim()).pop()?.trim().substring(0, 60) || "your closing line";

  // Build per-channel suggestions
  const channelSuggestions = {};
  const activeChannels = channels.length > 0 ? channels : ["facebook"];

  activeChannels.forEach(ch => {
    channelSuggestions[ch] = [];

    /* ── Voice suggestions ── */
    if (scores.voice < 80) {
      if (ch === "facebook") {
        channelSuggestions[ch].push({
          id: `${ch}-v1`, dimension: "voice", priority: "high", impact: 8,
          text: `Facebook audiences respond best to conversational, story-driven posts. "${firstSentence}..." could be more engaging.`,
          reasoning: `Your brand personality is "${brand.voice.personality.join(", ")}" but the opening feels generic. Facebook's algorithm favors posts that generate comments — questions and personal anecdotes drive 2-3x more engagement.`,
          action: "Rewrite the opening as a question or personal story hook",
          example: `Instead of "${firstSentence}...", try: "Ever wondered what makes the perfect [topic]? Here's what we've learned..."`,
        });
      }
      if (ch === "instagram") {
        channelSuggestions[ch].push({
          id: `${ch}-v1`, dimension: "voice", priority: "high", impact: 9,
          text: `Instagram captions should lead with a hook in the first line (before "...more"). "${firstSentence}..." may get cut off.`,
          reasoning: `Instagram truncates captions after ~125 characters. Your brand tone is "${brand.voice.tone.join(", ")}" — lead with the most compelling statement to stop the scroll.`,
          action: "Front-load the caption with an attention-grabbing first line",
          example: `Lead with something punchy like: "This changes everything 👇" or a bold brand statement.`,
        });
      }
      if (ch === "linkedin") {
        channelSuggestions[ch].push({
          id: `${ch}-v1`, dimension: "voice", priority: "medium", impact: 6,
          text: `LinkedIn favors thought leadership and value-driven content. The tone could be more authoritative.`,
          reasoning: `Your brand personality includes "${brand.voice.personality[0]}" — on LinkedIn, framing insights as expertise drives higher engagement. Posts with data or specific takeaways get 3x more shares.`,
          action: "Add a specific insight, statistic, or professional takeaway",
          example: `Add a line like: "Here's what 10 years in [industry] taught us about [topic]..."`,
        });
      }
    }
    if (!hasQuestion && scores.voice < 90) {
      channelSuggestions[ch].push({
        id: `${ch}-v2`, dimension: "voice", priority: "medium", impact: 5,
        text: "Adding a question increases engagement by inviting audience participation.",
        reasoning: `Posts with questions generate 2x more comments. For a "${brand.voice.personality[0]}" brand, this feels natural and on-brand.`,
        action: "Add a question to encourage comments and discussion",
        example: `Try ending with: "What's your favorite [topic]?" or "Have you tried this yet?"`,
      });
    }

    /* ── Media & Caption Relevance suggestions ── */
    if (!hasMedia) {
      channelSuggestions[ch].push({
        id: `${ch}-mr1`, dimension: "media", priority: "high", impact: 15,
        text: "No media attached — posts with images get 2.3x more engagement than text-only posts.",
        reasoning: `Whether you start with a caption idea or a visual, pairing both creates significantly stronger posts. ${ch === "instagram" ? "Instagram is visual-first — a post without media won't perform." : "Even on text-friendly platforms, visuals stop the scroll."}`,
        action: ch === "instagram" ? "Add at least one high-quality image or video" : "Attach a relevant image, video, or graphic to boost visibility",
        example: `Add media that directly illustrates your caption about "${topicWords.slice(0, 3).join(", ") || "your topic"}"`,
      });
    }
    if (hasMedia && mediaRelevanceRatio < 0.2) {
      channelSuggestions[ch].push({
        id: `${ch}-mr2`, dimension: "media", priority: "high", impact: 10,
        text: `Media doesn't appear to match the caption context. Your caption discusses "${topicWords.slice(0, 3).join(", ") || "your topic"}" but the media may not reflect this.`,
        reasoning: `Caption-media mismatch confuses the audience and reduces trust. Whether you wrote the caption first or chose the image first, both should tell the same story. Aligned media-caption posts see 45% higher engagement.`,
        action: "Swap the media to match your caption, or adjust the caption to match the visual",
        example: content.length > 50 ? `If your caption talks about "${topicWords[0] || "your topic"}", your image should visually reinforce that theme.` : "Write a caption that describes or complements what's shown in your media.",
      });
    }
    if (hasMedia && scores.media < 80) {
      channelSuggestions[ch].push({
        id: `${ch}-mr3`, dimension: "media", priority: "medium", impact: 6,
        text: `Ensure media uses brand colors (${brand.kit.colors.primary}, ${brand.kit.colors.secondary}) for visual consistency.`,
        reasoning: `Your brand kit defines specific colors and "${brand.kit.fonts.header}" typography. Consistent visual branding across posts increases brand recognition by up to 80%.`,
        action: "Apply brand-colored overlay, frame, or ensure media features brand colors",
      });
      if (ch === "instagram") {
        channelSuggestions[ch].push({
          id: `${ch}-mr4`, dimension: "media", priority: "medium", impact: 5,
          text: "Instagram carousel posts (2-5 images) get 3x more engagement than single images.",
          reasoning: `Carousels increase time-on-post and get re-shown by the algorithm. A story arc across slides keeps users swiping.`,
          action: "Consider adding 2-5 related images to create a carousel post",
        });
      }
    }
    if (hasMedia && uploadedMedia.length === 0 && stockMedia.length > 0) {
      channelSuggestions[ch].push({
        id: `${ch}-mr5`, dimension: "media", priority: "low", impact: 3,
        text: "Using stock/sample images — original brand photography performs 35% better.",
        reasoning: "Authentic, original content builds trust and brand identity better than generic stock imagery. Audiences can spot stock photos and engage less.",
        action: "Replace stock images with original brand photography when possible",
      });
    }

    /* ── Engagement & CTA suggestions ── */
    if (scores.cta < 80) {
      const foundCTA = strongCTAs.find(c => contentLower.includes(c)) || softCTAs.find(c => contentLower.includes(c));
      if (!foundCTA) {
        channelSuggestions[ch].push({
          id: `${ch}-c1`, dimension: "cta", priority: "high", impact: 12,
          text: `No clear call-to-action detected. "${lastSentence}..." ends without directing the reader.`,
          reasoning: `Every post should guide the reader to a next step. For a "${brand.voice.personality[0]}" brand, the CTA should feel like a natural invitation, not a hard sell. Posts with CTAs drive 3x more clicks.`,
          action: "Add a clear, on-brand call-to-action",
          example: ch === "instagram" ? "'Link in bio for more 👆' or 'Double tap if you agree ❤️'" : ch === "facebook" ? `"Ready to experience ${brand.name}? [Link] 🔗"` : `"Want to learn how? Read our latest insights → [Link]"`,
        });
      } else if (hasStrongCTA) {
        channelSuggestions[ch].push({
          id: `${ch}-c1`, dimension: "cta", priority: "low", impact: 3,
          text: `Good CTA detected ("${foundCTA}") — consider A/B testing with a brand-voice variant for better conversion.`,
          reasoning: `Brand-specific CTAs outperform generic ones by 2x. Your "${brand.voice.tone[0]}" tone suggests a ${brand.voice.tone[0].toLowerCase()} approach would resonate better.`,
          action: "Test a brand-voice-aligned CTA variant",
        });
      } else {
        channelSuggestions[ch].push({
          id: `${ch}-c1`, dimension: "cta", priority: "medium", impact: 7,
          text: `Soft CTA detected ("${foundCTA}") — upgrading to a specific action increases conversion 2-3x.`,
          reasoning: `Vague CTAs like "visit" or "check" don't create urgency. Replace with specific, action-oriented language that matches your "${brand.voice.tone[0]}" tone.`,
          action: "Replace with a specific, action-oriented CTA",
          example: `Instead of "${foundCTA}", try: "Shop the collection →" or "Book your free consultation today"`,
        });
      }
    }
    if (!hasLink && ch !== "instagram") {
      channelSuggestions[ch].push({
        id: `${ch}-c2`, dimension: "cta", priority: "medium", impact: 5,
        text: `No link detected — ${ch === "linkedin" ? "LinkedIn posts with links drive traffic but may get less reach" : "adding a link gives readers a clear next step"}.`,
        reasoning: ch === "linkedin" ? "LinkedIn sometimes de-prioritizes posts with links in the algorithm. Consider putting the link in the first comment instead." : "A trackable link helps measure post ROI and drives traffic to your owned properties.",
        action: ch === "linkedin" ? "Add link in the first comment, or use LinkedIn's native article feature" : "Add a relevant link to drive traffic",
      });
    }

    /* ── Hashtags & Keywords suggestions ── */
    if (scores.hashtags < 80) {
      const brandHashtag = `#${brand.name.replace(/\s+/g, "")}`;
      const hasBrandTag = hashtagList.some(h => h.toLowerCase().includes(brandKeywords[0]));
      if (!hasBrandTag) {
        channelSuggestions[ch].push({
          id: `${ch}-h1`, dimension: "hashtags", priority: "medium", impact: 6,
          text: `Missing branded hashtag — add "${brandHashtag}" for brand recall and tracking.`,
          reasoning: `Branded hashtags create a searchable content library and help track UGC. Users who search "${brandHashtag}" see all your posts in one place.`,
          action: `Add ${brandHashtag} to your hashtag set`,
        });
      }
      if (ch === "instagram" && hashtagList.length < 5) {
        channelSuggestions[ch].push({
          id: `${ch}-h2`, dimension: "hashtags", priority: "medium", impact: 7,
          text: `Only ${hashtagList.length} hashtags — Instagram posts perform best with 5-15 relevant hashtags.`,
          reasoning: `Instagram's algorithm uses hashtags for discovery. Mix branded tags, industry tags, and niche community tags. Posts with 11+ targeted hashtags get 79% more engagement.`,
          action: "Add a mix of branded, industry, and niche hashtags (aim for 8-15 total)",
        });
      }
      if (ch === "linkedin") {
        if (hashtagList.length > 5) {
          channelSuggestions[ch].push({
            id: `${ch}-h2`, dimension: "hashtags", priority: "low", impact: 3,
            text: `${hashtagList.length} hashtags is too many for LinkedIn — stick to 3-5 highly relevant ones.`,
            reasoning: `LinkedIn's algorithm may flag posts with excessive hashtags as spammy. Focus on 3-5 industry-specific tags your target audience follows.`,
            action: "Reduce to 3-5 targeted professional hashtags",
          });
        } else if (hashtagList.length === 0) {
          channelSuggestions[ch].push({
            id: `${ch}-h2`, dimension: "hashtags", priority: "medium", impact: 5,
            text: "No hashtags on LinkedIn — adding 3-5 relevant ones boosts discoverability.",
            reasoning: "LinkedIn hashtags help your content surface in topic feeds. Industry-specific tags connect you with your professional audience.",
            action: "Add 3-5 industry and topic hashtags",
          });
        }
      }
      if (ch === "facebook" && hashtagList.length > 3) {
        channelSuggestions[ch].push({
          id: `${ch}-h2`, dimension: "hashtags", priority: "low", impact: 2,
          text: `Facebook posts don't benefit much from heavy hashtag use. Keep to 1-3 max.`,
          reasoning: "Unlike Instagram, Facebook's algorithm doesn't heavily weight hashtags for discovery. Too many hashtags look spammy and reduce perceived quality.",
          action: "Reduce to 1-3 focused hashtags or remove entirely",
        });
      }
    }

    /* ── Content Structure suggestions ── */
    const channelLengths = { facebook: { min: 40, max: 100, name: "40-100" }, instagram: { min: 30, max: 150, name: "30-150" }, linkedin: { min: 50, max: 200, name: "50-200" }, twitter: { min: 5, max: 45, name: "5-45" } };
    const ideal = channelLengths[ch] || { min: 30, max: 150, name: "30-150" };
    if (words.length > ideal.max) {
      channelSuggestions[ch].push({
        id: `${ch}-s1`, dimension: "structure", priority: ch === "twitter" ? "high" : "medium", impact: ch === "twitter" ? 10 : 5,
        text: `At ${words.length} words, this post is long for ${ch}. Optimal length is ${ideal.name} words.`,
        reasoning: ch === "twitter" ? "X/Twitter's 280-character limit means ruthless editing. Distill to your single strongest statement." : `${ch === "facebook" ? "Facebook's 'See more' truncation kicks in around 480 characters." : ch === "linkedin" ? "LinkedIn shows ~210 characters before truncation on mobile." : "Shorter captions often outperform longer ones."} Trim to the most impactful message.`,
        action: `Trim to ${ideal.name} words for ${ch}`,
      });
    }
    if (words.length < ideal.min && words.length > 0) {
      channelSuggestions[ch].push({
        id: `${ch}-s1`, dimension: "structure", priority: "medium", impact: 4,
        text: `At ${words.length} words, this caption may be too brief for ${ch}. Aim for ${ideal.name} words.`,
        reasoning: `Very short captions lack context and don't give the algorithm enough signal to categorize your content. Add value, context, or a story to increase engagement.`,
        action: `Expand the caption to at least ${ideal.min} words with relevant context`,
      });
    }
    if (sentenceCount === 1 && words.length > 25) {
      channelSuggestions[ch].push({
        id: `${ch}-s2`, dimension: "structure", priority: "medium", impact: 4,
        text: "Single run-on sentence detected — breaking into 2-3 sentences improves readability.",
        reasoning: "Social media users scan content quickly. Shorter sentences with clear breaks improve comprehension and keep readers engaged.",
        action: "Break into 2-3 shorter sentences with a clear flow",
      });
    }
    if (lineBreaks === 0 && words.length > 50) {
      channelSuggestions[ch].push({
        id: `${ch}-s3`, dimension: "structure", priority: "low", impact: 3,
        text: "No line breaks — adding whitespace between ideas improves scannability.",
        reasoning: "Wall-of-text posts get scrolled past. Use line breaks to create visual breathing room, especially on mobile where screen width is narrow.",
        action: "Add line breaks between key ideas or after the hook",
      });
    }
    if (capsRatio > 0.5 && content.length > 20) {
      channelSuggestions[ch].push({
        id: `${ch}-s4`, dimension: "structure", priority: "medium", impact: 5,
        text: "Excessive use of ALL CAPS — this reads as shouting and reduces credibility.",
        reasoning: "All-caps text is harder to read and feels aggressive. Most platforms' algorithms may also down-rank all-caps content.",
        action: "Use sentence case and save caps for 1-2 key emphasis words at most",
      });
    }
    if (!hasEmoji && (ch === "facebook" || ch === "instagram")) {
      channelSuggestions[ch].push({
        id: `${ch}-s5`, dimension: "structure", priority: "low", impact: 2,
        text: `No emojis used — moderate emoji usage increases engagement on ${ch} by ~15%.`,
        reasoning: `Emojis add personality and visual breaks. For a "${brand.voice.personality[0]}" brand, 2-3 relevant emojis complement the tone without looking unprofessional.`,
        action: "Add 2-3 relevant emojis to highlight key points or emotions",
      });
    }

    /* ── Positive feedback ── */
    if (scores.voice >= 80) {
      channelSuggestions[ch].push({
        id: `${ch}-pos-v`, dimension: "voice", priority: "none", impact: 0,
        text: `Strong brand voice — the "${brand.voice.personality[0]}" personality comes through clearly.`,
        reasoning: `The language, sentence structure, and emotional tone closely match your brand voice guidelines.`,
        type: "positive",
      });
    }
    if (scores.media >= 80 && hasMedia) {
      channelSuggestions[ch].push({
        id: `${ch}-pos-m`, dimension: "media", priority: "none", impact: 0,
        text: `Good media-caption alignment — the visual supports the written message.`,
        reasoning: `Media and caption work together to tell a cohesive brand story. ${uploadedMedia.length > 0 ? "Original brand photography adds authenticity." : ""}`,
        type: "positive",
      });
    }
    if (scores.structure >= 80) {
      channelSuggestions[ch].push({
        id: `${ch}-pos-s`, dimension: "structure", priority: "none", impact: 0,
        text: `Well-structured content — good length and readability for ${ch}.`,
        reasoning: `Post length, formatting, and readability are optimized for this channel's audience expectations.`,
        type: "positive",
      });
    }
  });

  return {
    overall,
    scores,
    channelSuggestions,
    analyzedAt: new Date().toLocaleTimeString(),
  };
}

/* ── animated circular gauge ── */
function ScoreGauge({ score, size = 130, strokeWidth = 11 }) {
  const [display, setDisplay] = useState(0);
  const radius = (size - strokeWidth) / 2;
  const circ = 2 * Math.PI * radius;
  const offset = circ - (display / 100) * circ;
  const color = score >= 80 ? T.green : score >= 60 ? T.yellow : T.red;
  const label = score >= 80 ? "On Brand" : score >= 60 ? "Needs Work" : "Off Brand";
  const bg = score >= 80 ? T.greenLt : score >= 60 ? T.yellowLt : T.redLt;

  useEffect(() => {
    let start = Date.now();
    const dur = 1200;
    const tick = () => {
      const p = Math.min((Date.now() - start) / dur, 1);
      setDisplay(Math.round((1 - Math.pow(1 - p, 3)) * score));
      if (p < 1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }, [score]);

  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: "8px" }}>
      <div style={{ position: "relative", width: size, height: size }}>
        <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
          <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke={T.gray100} strokeWidth={strokeWidth} />
          <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke={color} strokeWidth={strokeWidth}
            strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round" />
        </svg>
        <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
          <span style={{ fontSize: "36px", fontWeight: 700, color: T.gray900, lineHeight: 1 }}>{display}</span>
          <span style={{ fontSize: "12px", color: T.gray500, marginTop: "2px" }}>/100</span>
        </div>
      </div>
      <span style={{ fontSize: "12px", fontWeight: 600, color, background: bg, padding: "3px 12px", borderRadius: "20px" }}>{label}</span>
    </div>
  );
}

/* ── progress bar ── */
function ScoreBar({ score, height = 6 }) {
  const color = score >= 80 ? T.green : score >= 60 ? T.yellow : score >= 40 ? T.orange : T.red;

/* ── button component ── */

    ghost: { background: "transparent", color: T.blue },
    danger: { background: T.redLt, color: T.red },

  return <button onClick={disabled ? undefined : onClick} style={{ ...base, ...sizes[size], ...variants[variant], ...sx }} {...props}>{children}</button>;

/* ── multi-select tag input ── */
function TagInput({ selected, options, onChange, placeholder }) {

  const available = options.filter(o => !selected.includes(o));
  return (
    <div style={{ position: "relative" }}>
      <div onClick={() => setOpen(!open)} style={{

          {available.map(o => (

}

/* ════════════════════════════════════════════════════════════════

function SuggestionCard({ s, applied, onApply }) {
  const [showDetail, setShowDetail] = useState(false);
  const isPositive = s.type === "positive";
  const prioStyle = { high: { bg: T.redLt, color: T.red, label: "High Impact" }, medium: { bg: T.yellowLt, color: T.yellow, label: "Medium" }, low: { bg: T.gray100, color: T.gray500, label: "Low" }, none: { bg: T.greenLt, color: T.green, label: "" } };
  const ps = prioStyle[s.priority] || prioStyle.low;

  return (
    <div style={{
      borderRadius: T.radiusSm, background: applied ? T.greenLt : isPositive ? T.greenLt : T.white,
      border: `1px solid ${applied ? "#BBF7D0" : isPositive ? "#BBF7D0" : T.gray200}`,
      overflow: "hidden", transition: "all 0.2s", opacity: applied ? 0.75 : 1,
    }}>
      <div style={{ padding: "10px 12px" }}>
        <div style={{ display: "flex", gap: "8px" }}>
          <div style={{ flex: 1 }}>
            <p style={{ fontSize: "13px", color: T.gray700, lineHeight: "19px", margin: 0 }}>
              {isPositive && <CheckCircle2 size={13} color={T.green} style={{ marginRight: 4, verticalAlign: "middle" }} />}
              {s.text}
            </p>
            <div style={{ display: "flex", gap: "6px", marginTop: "6px", alignItems: "center", flexWrap: "wrap" }}>
              {s.priority !== "none" && (
                <span style={{ fontSize: "11px", fontWeight: 500, color: ps.color, background: ps.bg, padding: "1px 7px", borderRadius: "4px" }}>{ps.label}</span>
              )}
              {s.impact > 0 && <span style={{ fontSize: "11px", color: T.green, fontWeight: 600 }}>+{s.impact} pts</span>}
              {(s.reasoning || s.example) && (
                <button onClick={() => setShowDetail(!showDetail)} style={{ fontSize: "11px", color: T.blue, background: "none", border: "none", cursor: "pointer", fontWeight: 500, padding: 0 }}>
                  {showDetail ? "Hide reasoning" : "Why this matters?"}
                </button>
              )}
            </div>
          </div>
          {!isPositive && !applied && (
            <Btn variant="secondary" size="sm" onClick={() => onApply(s.id)} style={{ alignSelf: "flex-start", flexShrink: 0, color: T.blue, fontWeight: 500 }}>Apply</Btn>
          )}
          {applied && (
            <div style={{ alignSelf: "center", display: "flex", alignItems: "center", gap: "3px", color: T.green, fontSize: "12px", fontWeight: 500, flexShrink: 0 }}>
              <Check size={14} /> Done
            </div>
          )}
        </div>
      </div>

      {/* Expandable reasoning section */}
      {showDetail && (
        <div style={{ padding: "0 12px 12px", borderTop: `1px solid ${T.gray100}`, marginTop: "0" }}>
          {s.reasoning && (
            <div style={{ marginTop: "8px", padding: "8px 10px", background: T.gray50, borderRadius: "4px", borderLeft: `3px solid ${T.blue}` }}>
              <div style={{ display: "flex", alignItems: "center", gap: "4px", marginBottom: "4px" }}>
                <Lightbulb size={12} color={T.blue} />
                <span style={{ fontSize: "11px", fontWeight: 600, color: T.blue }}>Why this matters</span>
              </div>
              <p style={{ fontSize: "12px", color: T.gray600, lineHeight: "17px", margin: 0 }}>{s.reasoning}</p>
            </div>
          )}
          {s.action && (
            <div style={{ marginTop: "6px", display: "flex", alignItems: "flex-start", gap: "4px" }}>
              <ArrowRight size={12} color={T.green} style={{ marginTop: "2px", flexShrink: 0 }} />
              <span style={{ fontSize: "12px", color: T.gray700, fontWeight: 500 }}>{s.action}</span>
            </div>
          )}
          {s.example && (
            <div style={{ marginTop: "6px", padding: "6px 10px", background: T.purpleLt, borderRadius: "4px" }}>
              <span style={{ fontSize: "11px", color: T.purple, fontWeight: 500 }}>💡 Example: </span>
              <span style={{ fontSize: "12px", color: T.gray600, fontStyle: "italic" }}>{s.example}</span>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════
   SCORING CRITERIA EDITOR
   ════════════════════════════════════════════════════════════════ */
function CriteriaEditor({ criteria, onChange, onClose }) {
  const [local, setLocal] = useState(criteria.map(c => ({ ...c })));
  const totalWeight = local.filter(c => c.enabled).reduce((a, c) => a + c.weight, 0);

  const update = (id, field, value) => {
    setLocal(prev => prev.map(c => c.id === id ? { ...c, [field]: value } : c));
  };

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center", background: "rgba(0,0,0,0.4)" }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{ width: "480px", maxHeight: "80vh", background: T.white, borderRadius: T.radiusLg, boxShadow: T.shadowLg, overflow: "hidden", display: "flex", flexDirection: "column" }}>
        <div style={{ padding: "20px 24px", borderBottom: `1px solid ${T.gray200}`, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div>
            <h3 style={{ margin: 0, fontSize: "16px", fontWeight: 600, color: T.gray900 }}>Scoring Criteria</h3>
            <p style={{ margin: "4px 0 0", fontSize: "12px", color: T.gray500 }}>Customize which dimensions matter and their weight</p>
          </div>
          <button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer" }}><X size={20} color={T.gray400} /></button>
        </div>
        <div style={{ padding: "16px 24px", overflow: "auto", flex: 1 }}>
          {totalWeight !== 100 && (
            <div style={{ padding: "8px 12px", background: T.yellowLt, borderRadius: T.radiusSm, marginBottom: "12px", display: "flex", alignItems: "center", gap: "6px" }}>
              <AlertTriangle size={14} color={T.yellow} />
              <span style={{ fontSize: "12px", color: T.gray700 }}>Weights should total 100%. Current: {totalWeight}%</span>
            </div>
          )}
          <div style={{ display: "flex", flexDirection: "column", gap: "10px" }}>
            {local.map(c => (
              <div key={c.id} style={{ display: "flex", alignItems: "center", gap: "12px", padding: "10px 12px", background: c.enabled ? T.white : T.gray50, border: `1px solid ${T.gray200}`, borderRadius: T.radiusSm, opacity: c.enabled ? 1 : 0.6 }}>
                <input type="checkbox" checked={c.enabled} onChange={e => update(c.id, "enabled", e.target.checked)} style={{ accentColor: T.blue }} />
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: "13px", fontWeight: 600, color: T.gray800 }}>{c.label}</div>
                  <div style={{ fontSize: "11px", color: T.gray500 }}>{c.description}</div>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
                  <input type="range" min={0} max={50} value={c.weight} disabled={!c.enabled}
                    onChange={e => update(c.id, "weight", parseInt(e.target.value))}
                    style={{ width: "80px", accentColor: T.blue }} />
                  <span style={{ fontSize: "13px", fontWeight: 600, color: T.gray700, minWidth: "32px", textAlign: "right" }}>{c.weight}%</span>
                </div>
              </div>
            ))}
          </div>
        </div>
        <div style={{ padding: "16px 24px", borderTop: `1px solid ${T.gray200}`, display: "flex", gap: "8px", justifyContent: "flex-end" }}>
          <Btn variant="secondary" onClick={onClose}>Cancel</Btn>
          <Btn variant="primary" onClick={() => { onChange(local); onClose(); }} disabled={totalWeight !== 100}>Save Criteria</Btn>
        </div>
      </div>
    </div>
  );
}

/* ── Dimension Accordion (extracted for hooks compliance) ── */
function DimensionAccordion({ criterion, score, suggestions, applied, onApply }) {
  const [exp, setExp] = useState(score < 70);
  const color = score >= 80 ? T.green : score >= 60 ? T.yellow : T.red;
  return (
    <div style={{ borderRadius: T.radiusSm, border: `1px solid ${T.gray200}`, overflow: "hidden", background: T.white }}>
      <button onClick={() => setExp(!exp)} style={{ width: "100%", display: "flex", alignItems: "center", gap: "10px", padding: "11px 12px", background: "none", border: "none", cursor: "pointer", textAlign: "left" }}>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "3px" }}>
            <span style={{ fontSize: "13px", fontWeight: 600, color: T.gray800 }}>{criterion.label}</span>
            <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
              <span style={{ fontSize: "11px", color: T.gray400 }}>{criterion.weight}%</span>
              <span style={{ fontSize: "13px", fontWeight: 700, color }}>{score}</span>
            </div>
          </div>
          <ScoreBar score={score} />
        </div>
        <ChevronDown size={14} color={T.gray400} style={{ transform: exp ? "rotate(180deg)" : "rotate(0)", transition: "transform 0.2s" }} />
      </button>
      {exp && suggestions.length > 0 && (
        <div style={{ padding: "0 12px 12px", display: "flex", flexDirection: "column", gap: "6px", borderTop: `1px solid ${T.gray100}` }}>
          <div style={{ height: "8px" }} />
          {suggestions.map(s => (
            <SuggestionCard key={s.id} s={s} applied={applied.has(s.id)} onApply={onApply} />
          ))}
        </div>
      )}
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════
   BRAND SCORE CONTENT (tab content inside right panel)
   ════════════════════════════════════════════════════════════════ */
function BrandScoreContent({ brands, postContent, channels, selectedMedia, onOpenSettings }) {
  const [selectedBrand, setSelectedBrand] = useState(brands[0]);
  const [dropdownOpen, setDropdownOpen] = useState(false);
  const [scoreData, setScoreData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [applied, setApplied] = useState(new Set());
  const [activeTab, setActiveTab] = useState("score");
  const [channelFilter, setChannelFilter] = useState("all");
  const [criteria, setCriteria] = useState(DEFAULT_CRITERIA);
  const [showCriteriaEditor, setShowCriteriaEditor] = useState(false);

  const runScoring = useCallback(() => {
    setLoading(true);
    setApplied(new Set());
    setTimeout(() => {
      setScoreData(generateScores(selectedBrand, postContent, channels, criteria, selectedMedia));
      setLoading(false);
    }, 2000);
  }, [selectedBrand, postContent, channels, criteria, selectedMedia]);

  useEffect(() => {
    if (!scoreData) runScoring();
  }, []);

  const handleApply = (id) => setApplied(prev => { const n = new Set(prev); n.add(id); return n; });

  const allSuggestions = useMemo(() => {
    if (!scoreData) return [];
    const ch = channelFilter === "all" ? Object.keys(scoreData.channelSuggestions) : [channelFilter];
    const seen = new Set();
    return ch.flatMap(c => (scoreData.channelSuggestions[c] || []).filter(s => { if (seen.has(s.id)) return false; seen.add(s.id); return true; }));
  }, [scoreData, channelFilter]);

  const actionable = allSuggestions.filter(s => s.type !== "positive");
  const appliedCount = actionable.filter(s => applied.has(s.id)).length;
  const estimatedGain = actionable.filter(s => applied.has(s.id)).reduce((a, s) => a + (s.impact || 0), 0);

  return (
    <>
      {showCriteriaEditor && <CriteriaEditor criteria={criteria} onChange={c => { setCriteria(c); setScoreData(null); setTimeout(runScoring, 100); }} onClose={() => setShowCriteriaEditor(false)} />}

        <button onClick={() => { setScoreData(null); setTimeout(runScoring, 50); }} title="Re-analyze" style={{ background: "none", border: `1px solid ${T.gray200}`, borderRadius: T.radiusSm, padding: "4px", cursor: "pointer", display: "flex" }}
          onMouseOver={e => e.currentTarget.style.background = T.gray50} onMouseOut={e => e.currentTarget.style.background = "none"}>
          <RefreshCw size={14} color={T.gray500} />
        </button>
      </div>

      {/* Body */}
      <div style={{ flex: 1, overflow: "auto", padding: "16px 18px", display: "flex", flexDirection: "column", gap: "14px" }}>

          {/* Brand selector */}
          <div>
            <label style={{ fontSize: "12px", fontWeight: 500, color: T.gray500, display: "block", marginBottom: "5px" }}>Brand Identity</label>
            <div style={{ position: "relative" }}>
              <button onClick={() => setDropdownOpen(!dropdownOpen)} style={{
                width: "100%", display: "flex", alignItems: "center", gap: "10px", padding: "8px 12px",
                background: T.white, border: `1px solid ${dropdownOpen ? T.blue : T.gray200}`, borderRadius: T.radiusSm, cursor: "pointer", textAlign: "left",
              }}>
                <span style={{ fontSize: "18px" }}>{selectedBrand.logo}</span>

                  <div key={i} style={{ width: 14, height: 14, borderRadius: "3px", background: c, border: "1px solid rgba(0,0,0,0.1)" }} />
                ))}
              </div>
              <span style={{ fontSize: "11px", color: T.gray500 }}>{selectedBrand.kit.fonts.header}, {selectedBrand.kit.fonts.body}</span>
            </div>
          </div>

          {/* Loading */}
          {loading && (
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", padding: "40px 20px", gap: "16px" }}>
              <div style={{ width: 48, height: 48, borderRadius: "50%", border: `3px solid ${T.gray200}`, borderTopColor: T.blue, animation: "spin 1s linear infinite" }} />
              <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
              <div style={{ textAlign: "center" }}>
                <p style={{ fontSize: "14px", fontWeight: 500, color: T.gray800, margin: "0 0 4px" }}>Analyzing your post...</p>
                <p style={{ fontSize: "12px", color: T.gray500, margin: 0 }}>Checking content, media, CTAs & hashtags against "{selectedBrand.name}" guidelines</p>
              </div>
            </div>
          )}

          {/* Results */}
          {!loading && scoreData && (
            <>
              {/* Gauge */}
              <div style={{ display: "flex", flexDirection: "column", alignItems: "center", padding: "4px 0" }}>
                <ScoreGauge score={scoreData.overall} />
                <p style={{ fontSize: "12px", color: T.gray500, marginTop: "6px", textAlign: "center", lineHeight: "17px" }}>
                  Your post is <strong style={{ color: T.gray700 }}>{scoreData.overall >= 80 ? "well aligned" : scoreData.overall >= 60 ? "partially aligned" : "not aligned"}</strong> with {selectedBrand.name}
                  {appliedCount > 0 && <><br /><span style={{ color: T.green }}>Estimated gain: +{estimatedGain} pts after applying {appliedCount} suggestions</span></>}
                </p>
              </div>

              {/* Tab switcher */}
              <div style={{ display: "flex", background: T.gray100, borderRadius: T.radiusSm, padding: "3px" }}>
                {[{ key: "score", label: "Breakdown" }, { key: "suggestions", label: `Suggestions (${actionable.length})` }].map(tab => (
                  <button key={tab.key} onClick={() => setActiveTab(tab.key)} style={{
                    flex: 1, padding: "7px 10px", fontSize: "12px", fontWeight: 500,
                    background: activeTab === tab.key ? T.white : "transparent",
                    color: activeTab === tab.key ? T.gray800 : T.gray500,
                    border: "none", borderRadius: "4px", cursor: "pointer",
                    boxShadow: activeTab === tab.key ? T.shadow : "none",
                  }}>{tab.label}</button>
                ))}
              </div>

              {/* Channel filter */}
              {channels.length > 1 && (
                <div style={{ display: "flex", gap: "4px", flexWrap: "wrap" }}>
                  <Pill onClick={() => setChannelFilter("all")} selected={channelFilter === "all"} color={T.blue} bg={T.blueLt}>All Channels</Pill>
                  {channels.map(ch => (
                    <Pill key={ch} onClick={() => setChannelFilter(ch)} selected={channelFilter === ch} color={T.blue} bg={T.blueLt}>
                      <ChannelIcon type={ch} size={12} /> <span style={{ textTransform: "capitalize" }}>{ch}</span>
                    </Pill>
                  ))}
                </div>
              )}

              {/* Score breakdown tab */}
              {activeTab === "score" && (
                <div style={{ display: "flex", flexDirection: "column", gap: "6px" }}>
                  {criteria.filter(c => c.enabled).map(c => (
                    <DimensionAccordion key={c.id} criterion={c} score={scoreData.scores[c.id] || 70}
                      suggestions={allSuggestions.filter(s => s.dimension === c.id)}
                      applied={applied} onApply={handleApply} />
                  ))}
                </div>
              )}

              {/* Suggestions tab */}
              {activeTab === "suggestions" && (
                <div style={{ display: "flex", flexDirection: "column", gap: "8px" }}>
                  {appliedCount > 0 && (
                    <div style={{ display: "flex", alignItems: "center", gap: "6px", padding: "8px 10px", background: T.greenLt, borderRadius: T.radiusSm }}>
                      <TrendingUp size={13} color={T.green} />
                      <span style={{ fontSize: "12px", color: T.greenDk, fontWeight: 500 }}>
                        {appliedCount}/{actionable.length} applied — est. +{estimatedGain} pts improvement
                      </span>
                    </div>
                  )}
                  {allSuggestions.map(s => (
                    <div key={s.id}>
                      <div style={{ display: "flex", alignItems: "center", gap: "5px", marginBottom: "3px" }}>
                        <span style={{ fontSize: "10px", fontWeight: 600, color: T.gray400, textTransform: "uppercase", letterSpacing: "0.5px" }}>
                          {criteria.find(c => c.id === s.dimension)?.label || s.dimension}
                        </span>
                      </div>
                      <SuggestionCard s={s} applied={applied.has(s.id)} onApply={handleApply} />
                    </div>
                  ))}
                </div>
              )}

              {/* Apply all */}
              {appliedCount < actionable.length && (
                <Btn variant="primary" style={{ width: "100%" }} onClick={() => actionable.forEach(s => handleApply(s.id))}>
                  <Zap size={14} /> Apply All Suggestions
                </Btn>
              )}
            </>
          )}
        </div>
    </>
  );
}


/* ════════════════════════════════════════════════════════════════
   MEDIA GALLERY MODAL
   ════════════════════════════════════════════════════════════════ */
function MediaGalleryModal({ onSelect, onClose, selectedMedia, onUpload }) {
  const [search, setSearch] = useState("");
  const [galleryTab, setGalleryTab] = useState("stock");
  const [dragOver, setDragOver] = useState(false);
  const fileInputRef = useRef(null);
  const filtered = search ? STOCK_IMAGES.filter(img => img.label.toLowerCase().includes(search.toLowerCase())) : STOCK_IMAGES;
  const selectedIds = new Set(selectedMedia.map(m => m.id));

  const handleFiles = (files) => {
    Array.from(files).forEach(file => {
      if (!file.type.startsWith("image/") && !file.type.startsWith("video/")) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        onUpload({
          id: "upload-" + Date.now() + "-" + Math.random().toString(36).substr(2, 5),
          label: file.name,
          dataUrl: e.target.result,
          isUpload: true,
          fileType: file.type.startsWith("video/") ? "video" : "image",
          fileSize: file.size,
        });
      };
      reader.readAsDataURL(file);
    });
  };

  const handleDrop = (e) => { e.preventDefault(); setDragOver(false); handleFiles(e.dataTransfer.files); };
  const handleDragOver = (e) => { e.preventDefault(); setDragOver(true); };
  const handleDragLeave = () => setDragOver(false);

  const uploadedMedia = selectedMedia.filter(m => m.isUpload);

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center" }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{ width: "600px", maxHeight: "82vh", background: T.white, borderRadius: T.radius, boxShadow: T.shadowLg, display: "flex", flexDirection: "column" }}>
        {/* Header */}
        <div style={{ padding: "16px 20px", borderBottom: `1px solid ${T.gray200}`, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <span style={{ fontSize: "15px", fontWeight: 600, color: T.gray900 }}>Media Gallery</span>
          <button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer" }}><X size={18} color={T.gray500} /></button>
        </div>

        {/* Tabs: Stock / Upload */}
        <div style={{ display: "flex", borderBottom: `2px solid ${T.gray200}`, padding: "0 20px" }}>
          {[{ key: "stock", label: "Stock Images", icon: Image }, { key: "upload", label: "Upload from Computer", icon: Upload }].map(tab => (
            <button key={tab.key} onClick={() => setGalleryTab(tab.key)} style={{
              display: "flex", alignItems: "center", gap: "6px", padding: "10px 16px", fontSize: "13px", fontWeight: galleryTab === tab.key ? 600 : 400,
              color: galleryTab === tab.key ? T.blue : T.gray500, background: "none", border: "none",
              borderBottom: galleryTab === tab.key ? `2px solid ${T.blue}` : "2px solid transparent",
              cursor: "pointer", marginBottom: "-2px",
            }}>
              <tab.icon size={14} />
              {tab.label}
            </button>
          ))}
        </div>

        {/* Stock images tab */}
        {galleryTab === "stock" && (
          <>
            <div style={{ padding: "12px 20px", borderBottom: `1px solid ${T.gray100}` }}>
              <div style={{ display: "flex", alignItems: "center", gap: "8px", padding: "8px 12px", background: T.gray50, borderRadius: T.radiusSm, border: `1px solid ${T.gray200}` }}>
                <Search size={15} color={T.gray400} />
                <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search images..." style={{ border: "none", outline: "none", background: "none", fontSize: "13px", flex: 1, fontFamily: T.font }} />
              </div>
            </div>
            <div style={{ flex: 1, overflow: "auto", padding: "16px 20px" }}>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: "10px" }}>
                {filtered.map(img => (
                  <button key={img.id} onClick={() => onSelect(img)} style={{
                    position: "relative", aspectRatio: "1", borderRadius: T.radiusSm, background: img.gradient,
                    border: selectedIds.has(img.id) ? `3px solid ${T.blue}` : `2px solid transparent`,
                    cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: "6px",
                    transition: "transform 0.15s", overflow: "hidden",
                  }}
                    onMouseOver={e => e.currentTarget.style.transform = "scale(1.04)"}
                    onMouseOut={e => e.currentTarget.style.transform = "scale(1)"}
                  >
                    <span style={{ fontSize: "28px" }}>{img.emoji}</span>
                    <span style={{ fontSize: "10px", color: "white", fontWeight: 600, textShadow: "0 1px 3px rgba(0,0,0,0.4)" }}>{img.label}</span>
                    {selectedIds.has(img.id) && (
                      <div style={{ position: "absolute", top: "6px", right: "6px", width: 20, height: 20, borderRadius: "50%", background: T.blue, display: "flex", alignItems: "center", justifyContent: "center" }}>
                        <Check size={12} color="white" />
                      </div>
                    )}
                  </button>
                ))}
              </div>
            </div>
          </>
        )}

        {/* Upload tab */}
        {galleryTab === "upload" && (
          <div style={{ flex: 1, overflow: "auto", padding: "20px" }}>
            {/* Drop zone */}
            <div
              onDrop={handleDrop} onDragOver={handleDragOver} onDragLeave={handleDragLeave}
              onClick={() => fileInputRef.current?.click()}
              style={{
                border: `2px dashed ${dragOver ? T.blue : T.gray300}`,
                borderRadius: T.radius, padding: "40px 20px", textAlign: "center", cursor: "pointer",
                background: dragOver ? T.blueLt : T.gray50, transition: "all 0.2s",
                marginBottom: uploadedMedia.length > 0 ? "16px" : "0",
              }}
              onMouseOver={e => { if (!dragOver) e.currentTarget.style.borderColor = T.blue; }}
              onMouseOut={e => { if (!dragOver) e.currentTarget.style.borderColor = T.gray300; }}
            >
              <input ref={fileInputRef} type="file" accept="image/*,video/*" multiple
                style={{ display: "none" }}
                onChange={e => { handleFiles(e.target.files); e.target.value = ""; }}
              />
              <Upload size={32} color={dragOver ? T.blue : T.gray400} />
              <p style={{ fontSize: "14px", fontWeight: 500, color: T.gray700, margin: "12px 0 4px" }}>
                {dragOver ? "Drop files here" : "Click to upload or drag & drop"}
              </p>
              <p style={{ fontSize: "12px", color: T.gray500, margin: 0 }}>
                Supports JPG, PNG, GIF, SVG, MP4, MOV
              </p>
            </div>

            {/* Uploaded files grid */}
            {uploadedMedia.length > 0 && (
              <>
                <div style={{ fontSize: "12px", fontWeight: 600, color: T.gray600, marginBottom: "10px" }}>
                  Uploaded ({uploadedMedia.length})
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: "10px" }}>
                  {uploadedMedia.map(img => (
                    <div key={img.id} style={{
                      position: "relative", aspectRatio: "1", borderRadius: T.radiusSm, overflow: "hidden",
                      border: `2px solid ${T.blue}`,
                    }}>
                      {img.fileType === "video" ? (
                        <div style={{ width: "100%", height: "100%", background: T.gray800, display: "flex", alignItems: "center", justifyContent: "center" }}>
                          <Monitor size={24} color={T.gray400} />
                        </div>
                      ) : (
                        <img src={img.dataUrl} alt={img.label} style={{ width: "100%", height: "100%", objectFit: "cover" }} />
                      )}
                      <button onClick={(e) => { e.stopPropagation(); onSelect(img); }} style={{
                        position: "absolute", top: "4px", right: "4px", width: 20, height: 20, borderRadius: "50%",
                        background: "rgba(0,0,0,0.6)", border: "none", cursor: "pointer", display: "flex",
                        alignItems: "center", justifyContent: "center", padding: 0,
                      }}>
                        <X size={10} color="white" />
                      </button>
                      <div style={{
                        position: "absolute", bottom: 0, left: 0, right: 0, padding: "4px 6px",
                        background: "rgba(0,0,0,0.6)", fontSize: "9px", color: "white", whiteSpace: "nowrap",
                        overflow: "hidden", textOverflow: "ellipsis",
                      }}>
                        {img.label}
                      </div>
                    </div>
                  ))}
                </div>
              </>
            )}
          </div>
        )}

        {/* Footer */}
        <div style={{ padding: "12px 20px", borderTop: `1px solid ${T.gray200}`, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <span style={{ fontSize: "12px", color: T.gray500 }}>{selectedMedia.length} item{selectedMedia.length !== 1 ? "s" : ""} selected</span>
          <Btn variant="primary" onClick={onClose}>Done</Btn>
        </div>
      </div>
    </div>
  );
}


/* ════════════════════════════════════════════════════════════════
   EMOJI PICKER POPOVER
   ════════════════════════════════════════════════════════════════ */
function EmojiPicker({ onSelect, onClose, anchorRef }) {
  const [activeCat, setActiveCat] = useState(0);
  const ref = useRef(null);
  useEffect(() => {
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target) && anchorRef?.current && !anchorRef.current.contains(e.target)) onClose(); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, [onClose, anchorRef]);
  return (
    <div ref={ref} style={{
      position: "absolute", bottom: "calc(100% + 8px)", left: 0, width: "320px", background: T.white,
      borderRadius: T.radius, boxShadow: T.shadowLg, border: `1px solid ${T.gray200}`, zIndex: 50, overflow: "hidden",
    }}>
      <div style={{ display: "flex", borderBottom: `1px solid ${T.gray100}`, padding: "6px 8px", gap: "2px" }}>
        {EMOJI_CATEGORIES.map((cat, i) => (
          <button key={cat.name} onClick={() => setActiveCat(i)} style={{
            flex: 1, padding: "5px 4px", fontSize: "11px", fontWeight: 500, borderRadius: "4px",
            background: activeCat === i ? T.blueLt : "transparent", color: activeCat === i ? T.blue : T.gray500,
            border: "none", cursor: "pointer",
          }}>{cat.name}</button>
        ))}
      </div>
      <div style={{ padding: "8px", height: "180px", overflow: "auto" }}>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(8, 1fr)", gap: "2px" }}>
          {EMOJI_CATEGORIES[activeCat].emojis.map((em, i) => (
            <button key={i} onClick={() => onSelect(em)} style={{
              width: "34px", height: "34px", display: "flex", alignItems: "center", justifyContent: "center",
              fontSize: "18px", background: "none", border: "none", borderRadius: "4px", cursor: "pointer",
            }}
              onMouseOver={e => e.currentTarget.style.background = T.gray100}
              onMouseOut={e => e.currentTarget.style.background = "none"}
            >{em}</button>
          ))}
        </div>
      </div>
    </div>
  );
}


/* ════════════════════════════════════════════════════════════════
   SCHEDULE PICKER MODAL
   ════════════════════════════════════════════════════════════════ */
function SchedulePickerModal({ onSchedule, onClose, initialDate, initialTime }) {
  const [date, setDate] = useState(initialDate || new Date().toISOString().split("T")[0]);
  const [time, setTime] = useState(initialTime || "10:00");
  const [timezone, setTimezone] = useState("America/New_York");
  const tzLabels = { "America/New_York": "Eastern (ET)", "America/Chicago": "Central (CT)", "America/Denver": "Mountain (MT)", "America/Los_Angeles": "Pacific (PT)", "UTC": "UTC" };
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center" }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{ width: "380px", background: T.white, borderRadius: T.radius, boxShadow: T.shadowLg }}>
        <div style={{ padding: "16px 20px", borderBottom: `1px solid ${T.gray200}`, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
            <Calendar size={18} color={T.blue} />
            <span style={{ fontSize: "15px", fontWeight: 600, color: T.gray900 }}>Schedule Post</span>
          </div>
          <button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer" }}><X size={18} color={T.gray500} /></button>
        </div>
        <div style={{ padding: "20px", display: "flex", flexDirection: "column", gap: "16px" }}>
          <div>
            <label style={{ fontSize: "12px", fontWeight: 500, color: T.gray600, display: "block", marginBottom: "6px" }}>Date</label>
            <input type="date" value={date} onChange={e => setDate(e.target.value)} style={{
              width: "100%", padding: "10px 12px", border: `1px solid ${T.gray200}`, borderRadius: T.radiusSm,
              fontSize: "14px", fontFamily: T.font, outline: "none", boxSizing: "border-box",
            }} />
          </div>
          <div>
            <label style={{ fontSize: "12px", fontWeight: 500, color: T.gray600, display: "block", marginBottom: "6px" }}>Time</label>
            <input type="time" value={time} onChange={e => setTime(e.target.value)} style={{
              width: "100%", padding: "10px 12px", border: `1px solid ${T.gray200}`, borderRadius: T.radiusSm,
              fontSize: "14px", fontFamily: T.font, outline: "none", boxSizing: "border-box",
            }} />
          </div>
          <div>
            <label style={{ fontSize: "12px", fontWeight: 500, color: T.gray600, display: "block", marginBottom: "6px" }}>Timezone</label>
            <select value={timezone} onChange={e => setTimezone(e.target.value)} style={{
              width: "100%", padding: "9px 14px", fontSize: "13px", color: T.gray800,
              border: `1px solid ${T.gray200}`, borderRadius: T.radiusSm, background: T.white,
              fontFamily: T.font, outline: "none", cursor: "pointer", boxSizing: "border-box",
            }}>
              {Object.entries(tzLabels).map(([k, v]) => <option key={k} value={k}>{v}</option>)}
            </select>
          </div>
          <div style={{ padding: "10px 12px", background: T.blueLt, borderRadius: T.radiusSm }}>
            <p style={{ fontSize: "13px", color: T.blue, margin: 0, fontWeight: 500 }}>
              <Clock size={13} style={{ verticalAlign: "middle", marginRight: "6px" }} />
              Scheduled for {new Date(date + "T" + time).toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" })} at {time} {tzLabels[timezone]}
            </p>
          </div>
        </div>
        <div style={{ padding: "12px 20px", borderTop: `1px solid ${T.gray200}`, display: "flex", justifyContent: "flex-end", gap: "8px" }}>
          <Btn onClick={onClose}>Cancel</Btn>
          <Btn variant="primary" onClick={() => { onSchedule(date, time, timezone); onClose(); }}>
            <Calendar size={14} /> Confirm Schedule
          </Btn>
        </div>
      </div>
    </div>
  );
}

function MediaPreviewGrid({ selectedMedia, brand }) {

    return (
      <div style={{ display: "grid", gridTemplateColumns: selectedMedia.length === 1 ? "1fr" : "1fr 1fr", gap: "2px" }}>
        {selectedMedia.slice(0, 4).map((img, i) => (
          <div key={img.id} style={{

/* Mock AI generation — simulates content generation with brand awareness */
function mockAIGenerate({ mode, prompt, brand, tone, existingContent, briefText, channels }) {
  const brandName = brand?.name || "your business";
  const personality = brand?.voice?.personality?.join(", ") || "professional";
  const toneStyle = tone || brand?.voice?.tone?.[0] || "engaging";

  if (mode === "ideas") {
    return SUGGESTED_TOPICS;
  }

  if (mode === "hashtags") {
    const base = brandName.replace(/[^a-zA-Z]/g, "").toLowerCase();
    return [
      `#${base}`, "#landscaping", "#outdoordesign", "#yardtransformation",
      "#gardendesign", "#outdoorliving", "#lawncare", "#curbeappeal",
      "#backyardgoals", "#landscapedesign", "#greenthumb", "#yardmakeover",
    ];
  }

  if (mode === "shorter" && existingContent) {
    const sentences = existingContent.split(/[.!?]+/).filter(s => s.trim());
    return sentences.slice(0, Math.ceil(sentences.length / 2)).join(". ").trim() + ".";
  }

  if (mode === "longer" && existingContent) {
    return existingContent + `\n\nAt ${brandName}, we're passionate about delivering results that exceed expectations. Our team of experts is ready to help you achieve your goals. Visit us today or book online to get started!\n\n📞 Call now for a free consultation\n🌐 Link in bio`;
  }

  if (mode === "grammar" && existingContent) {
    return existingContent
      .replace(/\s{2,}/g, " ")
      .replace(/\bi\b/g, "I")
      .replace(/\s+([.,!?])/g, "$1");
  }

  if (mode === "tone" && existingContent) {
    const toneMap = {
      "Professional": `We are pleased to share our latest offering at ${brandName}. Our team of dedicated professionals delivers exceptional results tailored to your unique needs. We invite you to experience the difference that expertise and commitment can make. Contact us today to schedule a consultation.`,
      "Casual": `Hey there! 👋 Just wanted to share something cool from ${brandName}. We've been doing some amazing work lately and honestly? We're pretty proud of it. Come check us out — we'd love to show you what we can do! 😊`,
      "Friendly": `Hi friends! ☀️ The team at ${brandName} is excited to connect with you! We love what we do, and it shows in every project. Whether you're just starting out or ready for a big change, we're here for you. Let's make something beautiful together! 💚`,
      "Bold": `🔥 READY FOR A TRANSFORMATION? ${brandName} doesn't just meet expectations — we CRUSH them. Our results speak louder than words. Don't settle for average. Choose excellence. Choose ${brandName}. Your move. 💪`,
      "Inspirational": `Every great space starts with a vision. At ${brandName}, we believe in the power of transformation — turning ordinary into extraordinary, one project at a time. Your dream space is closer than you think. Let's bring it to life together. ✨`,
      "Humorous": `Plot twist: your ${brandName.includes("Landscap") ? "yard" : "space"} could actually look AMAZING. 😱 We know, shocking. But seriously — our team works magic (okay, not actual magic, but it's close). Come see for yourself! 😄`,
      "Urgent": `⏰ LIMITED SPOTS AVAILABLE! ${brandName} is booking fast this season. Don't miss your chance to work with the best. Our calendar fills up quickly — secure your appointment TODAY before it's too late!`,
      "Empathetic": `We understand — finding the right partner for your project can feel overwhelming. At ${brandName}, we listen first. Your needs, your budget, your timeline — they all matter to us. Let's start with a conversation and go from there. We're in this together. 💛`,
    };
    return toneMap[tone] || toneMap["Professional"];
  }

  // Default: generate from prompt + brief
  const briefContext = briefText ? ` Drawing on the campaign brief: "${briefText.substring(0, 80)}..."` : "";
  const promptContext = prompt ? prompt : "Create an engaging social media post";
  return `Ready to turn your ordinary yard into something amazing? 🌿 [Location name] makes it simple to create the outdoor space you've always dreamed of.${briefContext ? "\n\n" : "\n\n"}Picture stepping outside to your own personal retreat - vibrant plants, perfectly designed layouts, and a space that truly reflects your style. We handle everything from concept to completion, so you can sit back and watch your vision come to life.\n\nOur team brings years of experience and genuine passion for creating beautiful outdoor spaces. We listen to your ideas, work within your budget, and deliver results that exceed expectations.\n\nDon't wait another season to love your yard. Your dream outdoor paradise is closer than you think.\n\nWhat's the one thing you'd love to see in your perfect outdoor space?\n\n#landscaping #outdoordesign #yardtransformation #gardendesign #outdoorliving`;
}

  const fileInputRef = useRef(null);
  const imgInputRef = useRef(null);

  const handleGenerate = (mode, opts = {}) => {
    setIsGenerating(true);
    setTimeout(() => {
      const result = mockAIGenerate({
        mode: mode || "generate",
        prompt: aiPrompt || opts.prompt,
        brand: selectedBrand,
        tone: opts.tone || selectedTone,
        existingContent: postContent,
        briefText,
        channels,
      });
      if (mode === "ideas") setGeneratedIdeas(result);
      else if (mode === "hashtags") setGeneratedHashtags(result);
      else setGeneratedContent(result);
      setIsGenerating(false);
    }, 1500);
  };

  const handleDocUpload = (e) => {
    const files = Array.from(e.target.files || []);
    files.forEach(file => {
      setUploadedDocs(prev => [...prev, { id: Date.now() + Math.random(), name: file.name, size: (file.size / 1024).toFixed(1) + " KB", type: file.type }]);
    });
    e.target.value = "";
  };

  const handleRefImageUpload = (e) => {
    const files = Array.from(e.target.files || []);
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        setUploadedRefImages(prev => [...prev, { id: Date.now() + Math.random(), name: file.name, dataUrl: ev.target.result }]);
      };
      reader.readAsDataURL(file);
    });
    e.target.value = "";
